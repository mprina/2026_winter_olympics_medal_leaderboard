<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 Winter Olympics Medal Leaderboard</title>
  <style>
    :root {
      --bg: #f3f4f6;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --gold: #f2c14e;
      --silver: #c4c4c4;
      --bronze: #b36a1f;
      --accent: #1f2937;
      --shadow: 0 8px 24px rgba(17, 24, 39, 0.06);
      --quiz-bg-top: #f4cb5a;
      --quiz-bg-bottom: #dfb23e;
      --quiz-title-color: #111827;
      --quiz-muted-color: var(--bronze);
    }

    [data-theme="dark"] {
      --bg: #0f172a;
      --card: #111827;
      --text: #f9fafb;
      --muted: #9ca3af;
      --line: #29303f;
      --gold: #e9b949;
      --silver: #b8bec8;
      --bronze: #b46f2f;
      --accent: #e5e7eb;
      --shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
      --quiz-bg-top: #0a0a0a;
      --quiz-bg-bottom: #000000;
      --quiz-title-color: #e9b949;
      --quiz-muted-color: var(--bronze);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      overflow-x: hidden;
    }

    body {
      margin: 0;
      background: radial-gradient(circle at 0% 0%, rgba(52, 211, 153, 0.08), transparent 35%), var(--bg);
      color: var(--text);
      font-family: "Futura", "Futura PT", "Avenir Next", "Segoe UI", Roboto, Arial, sans-serif;
    }

    .page {
      width: min(1100px, 100%);
      margin: 0 auto;
      padding: 24px 16px 20px;
      display: grid;
      gap: 20px;
      position: relative;
      z-index: 20;
      transform: translateY(0);
    }

    .panel {
      background: transparent;
      border: 0;
      border-radius: 0;
      box-shadow: none;
    }

    .title-section {
      padding: 10px 20px 0;
      display: grid;
      gap: 8px;
    }

    .podium-section {
      padding: 96px 20px 64px;
      display: grid;
      gap: 14px;
    }

    .title-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0;
      align-items: baseline;
      text-align: center;
      width: 100%;
    }

    h1 {
      margin: 0;
      letter-spacing: 0.02em;
      line-height: 1.05;
      display: grid;
      gap: 2px;
      justify-items: center;
      text-transform: uppercase;
      width: 100%;
    }

    .title-top {
      font-size: clamp(1rem, 2vw, 1.35rem);
      font-weight: 650;
      color: var(--muted);
    }

    .title-bottom {
      font-size: clamp(1.7rem, 4.2vw, 3rem);
      font-family: "Futura Bold", "Futura", "Futura PT", sans-serif;
      font-weight: 700;
      font-style: normal;
      color: var(--text);
    }

    .meta {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .podium-updated {
      text-align: center;
    }

    .podium {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0;
      align-items: end;
      min-height: 250px;
      padding-top: 78px;
    }

    .podium-card {
      border: 1px solid var(--line);
      border-radius: 0;
      position: relative;
      display: grid;
      place-items: center;
      padding: 8px;
      text-align: center;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent);
      overflow: visible;
    }

    .podium-card::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 14px;
      height: 2px;
      background: rgba(17, 24, 39, 0.18);
      pointer-events: none;
    }

    .podium-card + .podium-card {
      border-left: 0;
    }

    .rank-1 {
      min-height: 140px;
      background: linear-gradient(180deg, rgba(242, 193, 78, 0.95), rgba(214, 164, 45, 0.92));
      border-color: rgba(168, 118, 10, 0.45);
      border-left: 1px solid rgba(168, 118, 10, 0.45);
    }
    .rank-1::after {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 1px;
      background: rgba(155, 106, 8, 0.55);
      pointer-events: none;
    }
    .rank-2 {
      min-height: 110px;
      background: linear-gradient(180deg, rgba(212, 215, 220, 0.96), rgba(176, 182, 190, 0.92));
      border-color: rgba(120, 128, 138, 0.5);
      border-right: 0;
    }
    .rank-3 {
      min-height: 92px;
      background: linear-gradient(180deg, rgba(190, 123, 70, 0.96), rgba(162, 97, 48, 0.92));
      border-color: rgba(112, 63, 27, 0.55);
    }

    .podium-flag { line-height: 1; }
    .podium-flag-img {
      width: 116px;
      height: auto;
      border: 1px solid rgba(17, 24, 39, 0.16);
      display: block;
    }

    .podium-floating {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      display: grid;
      justify-items: center;
      gap: 5px;
      min-width: 120px;
      pointer-events: none;
      z-index: 1;
    }

    .podium-country { font-weight: 700; font-size: 0.95rem; }
    .podium-count { color: var(--muted); font-size: 0.85rem; }
    .podium-rings {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }

    .podium-rings-img {
      width: 52px;
      height: auto;
      display: block;
      opacity: 0.25;
      filter: none;
    }

    .table-wrap { padding: 8px 0 4px; overflow-x: hidden; }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 0;
      table-layout: fixed;
    }

    thead th {
      text-transform: uppercase;
      font-size: 0.8rem;
      letter-spacing: 0.06em;
      color: var(--muted);
      font-weight: 700;
      text-align: left;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      white-space: nowrap;
    }

    .sort-head {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border: 0;
      background: transparent;
      color: inherit;
      font: inherit;
      text-transform: inherit;
      letter-spacing: inherit;
      cursor: pointer;
      padding: 0;
    }

    .sort-arrow {
      visibility: hidden;
      font-size: 0.75rem;
      line-height: 1;
    }

    .sort-arrow.active {
      visibility: visible;
    }

    tbody td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      font-size: 1rem;
    }

    tbody tr:hover { background: rgba(156, 163, 175, 0.08); }

    .country-cell {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
    }

    .rank-col { width: 56px; text-align: center; }
    .rank-cell {
      text-align: center;
      color: var(--muted);
      font-weight: 700;
      width: 56px;
    }

    .flag {
      width: 34px;
      text-align: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .flag-img {
      width: 28px;
      height: auto;
      border: 1px solid rgba(17, 24, 39, 0.15);
      display: block;
    }

    .flag-fallback {
      font-size: 1.35rem;
      line-height: 1;
    }

    .metric { text-align: center; width: 90px; }
    .total {
      font-family: "Futura Bold", "Futura", "Futura PT", sans-serif;
      font-weight: 700;
    }

    .dots {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-height: 32px;
      align-items: flex-start;
      overflow: visible;
    }

    .dots-row {
      display: flex;
      align-items: center;
    }

    .dot {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      border: 2px solid var(--bg);
      flex: 0 0 auto;
      margin-left: -4px;
      position: relative;
    }

    .dot:first-child {
      margin-left: 0;
    }

    .dot.gold { background: var(--gold); }
    .dot.silver { background: var(--silver); }
    .dot.bronze { background: var(--bronze); }

    .control-group {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 0.85rem;
    }

    select {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 6px 8px;
      font-size: 0.9rem;
    }

    footer {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 0.9rem;
      padding: 2px 4px 10px;
    }

    a { color: inherit; }

    .easter-shell {
      position: fixed;
      left: 0;
      right: 0;
      top: 0;
      bottom: 0;
      z-index: 40;
      pointer-events: none;
      overflow: hidden;
      height: 100vh;
      background: linear-gradient(180deg, #0a0a0a 0%, #000000 100%);
      border-top: 0;
      transform: translateY(100%);
      transition: transform 420ms ease;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
      color: #f9fafb;
      --quiz-title-color: #e9b949;
      --quiz-muted-color: var(--bronze);
      --quiz-option-bg: rgba(17, 24, 39, 0.9);
      --quiz-option-border: rgba(248, 250, 252, 0.22);
      --quiz-option-text: #f9fafb;
      --quiz-option-hover-bg: rgba(31, 41, 55, 0.95);
      --quiz-option-hover-border: rgba(248, 250, 252, 0.36);
    }

    .easter-shell.open {
      pointer-events: auto;
      transform: translateY(0);
    }

    .quiz-panel {
      width: min(900px, 100%);
      margin: 0 auto;
      background: transparent;
      border: 0;
      box-shadow: none;
      border-radius: 0;
      padding: 18px 18px 22px;
      min-height: min(68vh, 620px);
      transform: translateY(100%);
      opacity: 0;
      transition: transform 420ms ease, opacity 300ms ease;
      position: relative;
      pointer-events: auto;
    }

    .heart-trigger {
      border: 0;
      background: transparent;
      color: inherit;
      font: inherit;
      padding: 0;
      margin: 0;
      line-height: 1;
      cursor: pointer;
    }

    .easter-shell.open .quiz-panel {
      transform: translateY(0);
      opacity: 1;
    }

    .quiz-close {
      position: absolute;
      right: 10px;
      top: 10px;
      border: 0;
      background: transparent;
      color: var(--gold);
      width: 34px;
      height: 34px;
      border-radius: 0;
      font-size: 2rem;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      cursor: pointer;
      transition: background-color 140ms ease, color 140ms ease, transform 140ms ease, border-radius 140ms ease;
    }

    .quiz-close:hover {
      background: color-mix(in srgb, var(--bronze) 78%, transparent);
      color: var(--gold);
      border-radius: 999px;
      transform: scale(1.04);
    }

    .quiz-header {
      padding: 0 40px 0 14px;
      margin-bottom: 14px;
    }

    .quiz-title {
      margin: 0;
      font-size: clamp(1.7rem, 3.6vw, 2.4rem);
      letter-spacing: 0.03em;
      text-transform: uppercase;
      font-family: "Futura Bold", "Futura", sans-serif;
      color: var(--quiz-title-color);
    }

    .quiz-subtitle {
      margin: 4px 0 0;
      color: var(--quiz-muted-color);
      font-size: 0.9rem;
    }

    .quiz-card {
      border: 0;
      border-radius: 12px;
      background: transparent;
      padding: 14px;
    }

    .quiz-progress {
      color: var(--quiz-muted-color);
      font-size: 0.84rem;
      margin-bottom: 6px;
    }

    .quiz-tracker {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }

    .quiz-track-dot {
      width: 22px;
      height: 22px;
      border-radius: 999px;
      border: 1px solid rgba(17, 24, 39, 0.35);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text);
      background: rgba(255, 255, 255, 0.15);
    }

    .quiz-track-dot.current {
      border-color: var(--bronze);
    }

    .quiz-track-dot.correct {
      background: rgba(16, 185, 129, 0.24);
      border-color: rgba(5, 150, 105, 0.8);
      color: #065f46;
    }

    .quiz-track-dot.wrong {
      background: rgba(239, 68, 68, 0.2);
      border-color: rgba(185, 28, 28, 0.8);
      color: #7f1d1d;
    }

    .quiz-question {
      font-size: 1.02rem;
      margin: 0 0 12px;
      font-weight: 700;
    }

    .quiz-options {
      display: grid;
      gap: 8px;
    }

    .quiz-option {
      text-align: left;
      border: 1px solid var(--quiz-option-border);
      background: var(--quiz-option-bg);
      color: var(--quiz-option-text);
      border-radius: 9px;
      padding: 10px 12px;
      cursor: pointer;
      font-size: 0.96rem;
      transition: border-color 140ms ease, background-color 140ms ease, transform 140ms ease;
    }

    .quiz-option.selected {
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.18);
    }

    .quiz-option:hover:not(:disabled) {
      border-color: var(--quiz-option-hover-border);
      background: var(--quiz-option-hover-bg);
      transform: translateY(-1px);
    }

    .quiz-option.correct {
      border-color: rgba(5, 150, 105, 0.9);
      background: rgba(16, 185, 129, 0.2);
    }

    .quiz-option.wrong {
      border-color: rgba(185, 28, 28, 0.9);
      background: rgba(239, 68, 68, 0.16);
    }

    .quiz-feedback {
      min-height: 1.4em;
      margin-top: 10px;
      color: var(--quiz-muted-color);
      font-size: 0.9rem;
    }

    .quiz-feedback.correct {
      color: #065f46;
    }

    .quiz-feedback.wrong {
      color: #7f1d1d;
    }

    .quiz-actions {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .btn {
      border: 1px solid var(--bronze);
      background: transparent;
      color: var(--bronze);
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 0.92rem;
      cursor: pointer;
      transition: background-color 140ms ease, color 140ms ease, border-color 140ms ease, transform 140ms ease;
    }

    .btn.primary {
      background: var(--gold);
      color: #111827;
      border-color: rgba(17, 24, 39, 0.2);
    }

    .btn:hover:not(:disabled) {
      background: color-mix(in srgb, var(--bronze) 12%, transparent);
      transform: translateY(-1px);
    }

    .btn.primary:hover:not(:disabled) {
      background: color-mix(in srgb, var(--gold) 86%, #ffffff 14%);
      border-color: rgba(17, 24, 39, 0.35);
      color: #111827;
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .quiz-result {
      display: none;
      border: 0;
      border-radius: 12px;
      background: transparent;
      padding: 16px;
    }

    .quiz-result.show {
      display: block;
    }

    .quiz-score {
      font-size: clamp(2.5rem, 7vw, 3.6rem);
      margin: 0;
      font-family: "Futura Bold", "Futura", sans-serif;
      color: var(--quiz-title-color);
    }

    .quiz-result-copy {
      margin: 6px 0 0;
      color: var(--quiz-muted-color);
    }

    .quiz-share-status {
      margin-top: 10px;
      color: var(--quiz-muted-color);
      font-size: 0.84rem;
      min-height: 1.2em;
    }

    /* Tablet layout */
    @media (max-width: 980px) {
      .page { padding: 18px 12px 14px; gap: 14px; }
      .title-section { padding: 8px 10px 0; }
      .podium-section { padding: 72px 10px 44px; }
      .podium { min-height: 230px; padding-top: 68px; }
      .podium-flag-img { width: 92px; }
    }

    /* Mid-narrow table compaction */
    @media (max-width: 820px) {
      .rank-col, .rank-cell { width: 44px; }
      .metric { width: 72px; }
      tbody td { padding: 11px 8px; }
      thead th { padding: 10px 8px; }
      .country-cell { gap: 8px; }
    }

    /* Hide medal breakdown on narrower screens */
    @media (max-width: 740px) {
      #thBreakdown, td:last-child { display: none; }
    }

    /* Phone layout */
    @media (max-width: 720px) {
      .podium-section { padding: 56px 6px 34px; }
      .podium { min-height: 196px; padding: 56px 6px 0; }
      .podium-floating { min-width: 96px; gap: 3px; bottom: calc(100% + 6px); }
      .podium-flag-img { width: 72px; }
      .podium-country { font-size: 0.86rem; }
      .podium-count { font-size: 0.78rem; }
      .podium-rings-img { width: 42px; }
      .rank-1 { min-height: 112px; }
      .rank-2 { min-height: 90px; }
      .rank-3 { min-height: 76px; }
      tbody td { padding: 11px 8px; font-size: 0.92rem; }
      thead th { padding: 10px 8px; font-size: 0.72rem; }
      .flag { width: 30px; }
      .flag-img { width: 24px; }
      .dot { width: 12px; height: 12px; margin-left: -3px; }
      footer { justify-content: center; text-align: center; gap: 8px; }
      .control-group { justify-content: center; }
      .quiz-panel { border-radius: 12px 12px 0 0; padding: 14px 10px 18px; min-height: 70vh; }
      .quiz-title { font-size: 1.05rem; }
      .quiz-question { font-size: 0.94rem; }
      .quiz-option { font-size: 0.89rem; }
    }

    /* Small phone layout */
    @media (max-width: 560px) {
      .page { padding: 12px 8px 12px; }
      .title-section { padding: 6px 0 0; }
      h1 { gap: 0; }
      .title-top { font-size: 0.86rem; }
      .title-bottom { font-size: clamp(1.1rem, 7.2vw, 1.55rem); letter-spacing: 0.01em; }
      .podium-section { padding: 48px 0 24px; gap: 10px; }
      .podium { min-height: 180px; padding: 52px 8px 0; }
      .podium-flag-img { width: 58px; }
      .podium-country { font-size: 0.8rem; }
      .podium-count { font-size: 0.74rem; }
      .podium-rings-img { width: 36px; }
      .podium-card { padding: 6px; }
      .podium-card::before { top: 10px; }
      .rank-1 { min-height: 100px; }
      .rank-2 { min-height: 82px; }
      .rank-3 { min-height: 70px; }
      table { width: 100%; }
      .rank-col, .rank-cell { width: 40px; }
      .metric { width: 68px; }
      .dot { width: 10px; height: 10px; margin-left: -2px; border-width: 1.5px; }
      .control-group { width: 100%; }
      #officialLink { width: 100%; }
      #madeBy { width: 100%; }
    }

    /* Very small screens */
    @media (max-width: 420px) {
      .title-bottom { font-size: 1rem; }
      .title-top { font-size: 0.74rem; }
      .metric { width: 56px; }
      .rank-col, .rank-cell { width: 32px; }
      tbody td { padding: 9px 6px; font-size: 0.86rem; }
      thead th { padding: 8px 6px; font-size: 0.66rem; }
      .flag { width: 24px; }
      .flag-img { width: 20px; }
    }
  </style>
</head>
<body data-theme="light">
  <main class="page">
    <section class="panel title-section">
      <div class="title-row">
        <h1 id="title">
          <span class="title-top">2026 Winter Olympics</span>
          <span class="title-bottom">Medal Leaderboard</span>
        </h1>
      </div>
    </section>

    <section class="panel podium-section">
      <div class="podium" id="podium"></div>
      <div class="meta podium-updated" id="status">Loading medal data...</div>
    </section>

    <section class="panel">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th scope="col" class="rank-col" id="thRank">Rank</th>
              <th scope="col" id="thCountry">Country</th>
              <th scope="col" class="metric" id="thGold" data-sort="gold" aria-sort="none"></th>
              <th scope="col" class="metric" id="thSilver" data-sort="silver" aria-sort="none"></th>
              <th scope="col" class="metric" id="thBronze" data-sort="bronze" aria-sort="none"></th>
              <th scope="col" class="metric" id="thTotal" data-sort="total" aria-sort="descending"></th>
              <th scope="col" id="thBreakdown">Breakdown</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </section>

    <footer>
      <a id="officialLink" href="https://www.olympics.com/en/milano-cortina-2026/medals" target="_blank" rel="noopener noreferrer">
        Offical Olympics Website
      </a>
      <div class="control-group">
        <label for="languagePicker" id="langLabel">Language</label>
        <select id="languagePicker">
          <option value="en">English</option>
          <option value="it">Italiano</option>
          <option value="es">Español</option>
          <option value="pt">Português</option>
          <option value="fr">Français</option>
          <option value="zh">中文</option>
          <option value="ja">日本語</option>
          <option value="ko">한국어</option>
          <option value="fil">Filipino</option>
          <option value="ru">Русский</option>
          <option value="nl">Nederlands</option>
          <option value="de">Deutsch</option>
          <option value="no">Norsk</option>
          <option value="sv">Svenska</option>
          <option value="fi">Suomi</option>

    const COUNTRY_NAME_CACHE = {};

    function flagFromNoc(noc) {
      const iso = NOC_TO_ISO2[noc];
      if (!iso || iso.length !== 2) return "🏳️";
      return String.fromCodePoint(127397 + iso.charCodeAt(0), 127397 + iso.charCodeAt(1));
    }

    function flagImageUrl(noc, width) {
      const iso = NOC_TO_ISO2[noc];
      if (!iso || iso.length !== 2) return "";
      return `https://flagcdn.com/w${width}/${iso.toLowerCase()}.png`;
    }

    function normalizeLoadedRows(rows) {
      if (!Array.isArray(rows)) return [];
      return rows
        .map((row) => {
          const noc = String(row.noc || "").toUpperCase();
          const country = String(row.country || "").trim();
          const gold = Number(row.gold || 0);
          const silver = Number(row.silver || 0);
          const bronze = Number(row.bronze || 0);
          if (!country || !NOC_TO_ISO2[noc]) return null;
          if (Number.isNaN(gold) || Number.isNaN(silver) || Number.isNaN(bronze)) return null;
          return { noc, country, gold, silver, bronze, total: gold + silver + bronze };
        })
        .filter(Boolean)
        .filter((row) => row.total > 0);
    }

    async function fetchLocalMedals() {
      try {
        const res = await fetch(`${MEDALS_JSON_URL}?t=${Date.now()}`, { cache: "no-store" });
        if (!res.ok) throw new Error("Failed to fetch medals.json");
        const payload = await res.json();
        const rows = normalizeLoadedRows(Array.isArray(payload) ? payload : payload.rows);
        if (rows.length === 0) throw new Error("medals.json had no valid rows");
        return { rows, fetchedAt: payload.fetched_at || null };
      } catch (_) {
        const fallback = FALLBACK_MEDALS.map((d) => ({ ...d, total: d.gold + d.silver + d.bronze }));
        return { rows: fallback, fetchedAt: null };
      }
    }

    function sortRows(rows, sortBy) {
      const ordered = [...rows];
      ordered.sort((a, b) => {
        const byTotal = b.total - a.total;
        const byGold = b.gold - a.gold;
        const bySilver = b.silver - a.silver;
        const byBronze = b.bronze - a.bronze;
        const byName = a.country.localeCompare(b.country);

        if (sortBy === "gold") return byGold || bySilver || byBronze || byTotal || byName;
        if (sortBy === "silver") return bySilver || byGold || byBronze || byTotal || byName;
        if (sortBy === "bronze") return byBronze || byGold || bySilver || byTotal || byName;
        return byTotal || byGold || bySilver || byBronze || byName;
      });
      return ordered;
    }

    function localizeCountry(row) {
      if (state.language === "en") return row.country;
      const iso2 = NOC_TO_ISO2[row.noc];
      if (!iso2) return row.country;
      try {
        if (!COUNTRY_NAME_CACHE[state.language]) {
          COUNTRY_NAME_CACHE[state.language] = new Intl.DisplayNames([state.language], { type: "region" });
        }
        return COUNTRY_NAME_CACHE[state.language].of(iso2) || row.country;
      } catch (_) {
        return row.country;
      }
    }

    function medalDots(row) {
      const total = row.gold + row.silver + row.bronze;
      if (total === 0) return "";

      const makeRow = (gold, silver, bronze) => {
        let html = "";
        const totalInRow = gold + silver + bronze;
        let z = totalInRow;
        for (let i = 0; i < gold; i += 1) html += `<span class="dot gold" style="z-index:${z--}"></span>`;
        for (let i = 0; i < silver; i += 1) html += `<span class="dot silver" style="z-index:${z--}"></span>`;
        for (let i = 0; i < bronze; i += 1) html += `<span class="dot bronze" style="z-index:${z--}"></span>`;
        return html;
      };

      // Fill columns top-first then bottom to match NYT's two-row medal pattern.
      let topGold = 0;
      let bottomGold = 0;
      let topSilver = 0;
      let bottomSilver = 0;
      let topBronze = 0;
      let bottomBronze = 0;
      let medalIndex = 0;
      const place = (color) => {
        const isTop = medalIndex % 2 === 0;
        medalIndex += 1;
        if (color === "gold") {
          if (isTop) topGold += 1;
          else bottomGold += 1;
        } else if (color === "silver") {
          if (isTop) topSilver += 1;
          else bottomSilver += 1;
        } else {
          if (isTop) topBronze += 1;
          else bottomBronze += 1;
        }
      };

      for (let i = 0; i < row.gold; i += 1) place("gold");
      for (let i = 0; i < row.silver; i += 1) place("silver");
      for (let i = 0; i < row.bronze; i += 1) place("bronze");

      const topRow = makeRow(topGold, topSilver, topBronze);
      const bottomRow = makeRow(bottomGold, bottomSilver, bottomBronze);
      if (!bottomRow) return `<div class="dots-row">${topRow}</div>`;
      return `<div class="dots-row">${topRow}</div><div class="dots-row">${bottomRow}</div>`;
    }

    function renderPodium(rows) {
      const podium = document.getElementById("podium");
      const top = rows.slice(0, 3);
      const order = [1, 0, 2];
      const rankClass = ["rank-2", "rank-1", "rank-3"];

      podium.innerHTML = order.map((idx, col) => {
        const item = top[idx];
        if (!item) {
          return `
            <div class="podium-card ${rankClass[col]}">
              <div class="podium-rings" aria-label="Olympic rings symbol">
                <img class="podium-rings-img" src="images/olympics-1.svg" alt="Olympic rings">
              </div>
            </div>
          `;
        }
        const localizedCountry = localizeCountry(item);
        const flagEmoji = flagFromNoc(item.noc);
        const flagUrl = flagImageUrl(item.noc, 80);
        return `
          <article class="podium-card ${rankClass[col]}">
            <div class="podium-floating">
              <div class="podium-flag">
                ${flagUrl
                  ? `<img class="podium-flag-img" src="${flagUrl}" alt="${localizedCountry} flag" onerror="this.outerHTML='${flagEmoji}'">`
                  : `<span class="flag-fallback" aria-hidden="true">${flagEmoji}</span>`
                }
              </div>
              <div class="podium-country">${localizedCountry}</div>
              <div class="podium-count">${item.total}</div>
            </div>
            <div class="podium-rings" aria-label="Olympic rings symbol">
              <img class="podium-rings-img" src="images/olympics-1.svg" alt="Olympic rings">
            </div>
          </article>
        `;
      }).join("");
    }

    function renderTable(rows) {
      const body = document.getElementById("rows");
      body.innerHTML = rows.map((row, index) => {
        const localizedCountry = localizeCountry(row);
        const flagEmoji = flagFromNoc(row.noc);
        const flagUrl = flagImageUrl(row.noc, 40);
        return `
          <tr>
            <td class="rank-cell">${index + 1}</td>
            <td>
              <div class="country-cell">
                <span class="flag">
                  ${flagUrl
                    ? `<img class="flag-img" src="${flagUrl}" alt="${localizedCountry} flag" onerror="this.outerHTML='<span class=&quot;flag-fallback&quot; aria-hidden=&quot;true&quot;>${flagEmoji}</span>'">`
                    : `<span class="flag-fallback" aria-hidden="true">${flagEmoji}</span>`
                  }
                </span>
                <span>${localizedCountry}</span>
              </div>
            </td>
            <td class="metric">${row.gold}</td>
            <td class="metric">${row.silver}</td>
            <td class="metric">${row.bronze}</td>
            <td class="metric total">${row.total}</td>
            <td><div class="dots" aria-label="Medal breakdown">${medalDots(row)}</div></td>
          </tr>
        `;
      }).join("");
    }

    function applyStrings() {
      const t = STRINGS[state.language];
      document.documentElement.lang = state.language;
      document.getElementById("title").innerHTML = `<span class="title-top">${t.titleTop}</span><span class="title-bottom">${t.titleBottom}</span>`;
      document.getElementById("thRank").textContent = t.rank;
      document.getElementById("thCountry").textContent = t.country;
      setSortableHeader("thGold", t.gold, "gold");
      setSortableHeader("thSilver", t.silver, "silver");
      setSortableHeader("thBronze", t.bronze, "bronze");
      setSortableHeader("thTotal", t.total, "total");
      document.getElementById("thBreakdown").textContent = t.breakdown;
      document.getElementById("officialLink").textContent = t.officialLink;
      document.getElementById("langLabel").textContent = t.language;
      document.getElementById("themeLabel").textContent = t.theme;
      const heartButtonHtml = '<button type="button" class="heart-trigger" id="heartTrigger" aria-label="Open Olympics trivia">❤️</button>';
      const madeWithCopy = t.madeWith.includes("❤️")
        ? t.madeWith.replace("❤️", heartButtonHtml)
        : `${t.madeWith} ${heartButtonHtml}`;
      document.getElementById("madeBy").innerHTML = `${madeWithCopy} <a id="designerLink" href="https://www.instagram.com/mattprina_design/" target="_blank" rel="noopener noreferrer">Matt Prina Design</a>`;
      bindHeartTrigger();

      const themePicker = document.getElementById("themePicker");
      themePicker.options[0].text = t.light;
      themePicker.options[1].text = t.dark;

      renderSortIndicators();
      renderStatus();
    }

    function bindHeartTrigger() {
      const heart = document.getElementById("heartTrigger");
      if (!heart) return;
      heart.onclick = (event) => {
        event.preventDefault();
        event.stopPropagation();
        openEasterQuiz();
      };
    }

    function renderStatus() {
      const t = STRINGS[state.language];
      const status = document.getElementById("status");
      if (!state.fetchedAt) {
        status.textContent = t.loading;
        return;
      }
      const sourceTime = new Date(state.fetchedAt);
      const stamp = sourceTime.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
      status.textContent = `${t.updated}: ${stamp}`;
    }

    function buildQuizRound() {
      const pool = [...OLYMPICS_QUIZ_POOL];
      for (let i = pool.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
      }
      return pool.slice(0, Math.min(QUIZ_QUESTION_COUNT, pool.length));
    }

    function resetQuiz() {
      state.quizQuestions = buildQuizRound();
      state.quizIndex = 0;
      state.quizScore = 0;
      state.quizSelected = null;
      state.quizComplete = false;
      state.quizRevealed = false;
      state.quizHistory = Array(state.quizQuestions.length).fill(null);
      document.getElementById("quizShareStatus").textContent = "";
      renderQuiz();
    }

    function renderQuiz() {
      const quizCard = document.getElementById("quizCard");
      const quizResult = document.getElementById("quizResult");
      const nextBtn = document.getElementById("quizNext");
      const tracker = document.getElementById("quizTracker");
      const questions = state.quizQuestions;

      if (state.quizComplete) {
        quizCard.style.display = "none";
        quizResult.classList.add("show");
        const total = questions.length;

        let medal = "🥉";
        let message = "Nice run. You know your Winter Olympics.";
        if (state.quizScore === total) {
          medal = "🥇";
          message = "Perfect score. Olympic-level trivia performance.";
        } else if (state.quizScore >= 5) {
          medal = "🥈";
          message = "Strong run. You know your Winter Olympics.";
        } else {
          message = "Good try. Better luck next time.";
        }
        document.getElementById("quizScore").textContent = `${state.quizScore}/${total}`;
        document.getElementById("quizResultCopy").textContent = `${message} ${medal}`;
        return;
      }

      quizCard.style.display = "block";
      quizResult.classList.remove("show");

      const item = questions[state.quizIndex];
      tracker.innerHTML = state.quizHistory
        .map((result, idx) => {
          const isCurrent = result === null && idx === state.quizIndex && !state.quizRevealed;
          const currentClass = isCurrent ? " current" : "";
          if (result === true) return '<span class="quiz-track-dot correct" aria-label="Correct">✓</span>';
          if (result === false) return '<span class="quiz-track-dot wrong" aria-label="Incorrect">✕</span>';
          return `<span class="quiz-track-dot${currentClass}" aria-label="Unanswered"></span>`;
        })
        .join("");

      document.getElementById("quizProgress").textContent = `Question ${state.quizIndex + 1} of ${questions.length}`;
      document.getElementById("quizQuestion").textContent = item.question;
      const options = document.getElementById("quizOptions");
      const feedback = document.getElementById("quizFeedback");

      options.innerHTML = item.options
        .map((opt, idx) => {
          const selectedClass = state.quizSelected === idx ? " selected" : "";
          const revealCorrect = state.quizRevealed && idx === item.answer ? " correct" : "";
          const revealWrong = state.quizRevealed && state.quizSelected === idx && idx !== item.answer ? " wrong" : "";
          const disabledAttr = state.quizRevealed ? " disabled" : "";
          return `<button type="button" class="quiz-option${selectedClass}${revealCorrect}${revealWrong}" data-idx="${idx}"${disabledAttr}>${opt}</button>`;
        })
        .join("");

      if (!state.quizRevealed) {
        feedback.className = "quiz-feedback";
        feedback.textContent = "";
        nextBtn.textContent = "Check Answer";
        nextBtn.disabled = state.quizSelected === null;
      } else {
        const correct = state.quizSelected === item.answer;
        const correctAnswer = item.options[item.answer];
        feedback.className = `quiz-feedback ${correct ? "correct" : "wrong"}`;
        feedback.textContent = `${correct ? "Correct." : `Incorrect. Correct answer: ${correctAnswer}.`} ${item.context || ""}`;
        nextBtn.textContent = state.quizIndex === questions.length - 1 ? "Finish" : "Continue";
        nextBtn.disabled = false;
      }
    }

    async function createScoreCardBlob() {
      const canvas = document.createElement("canvas");
      canvas.width = 1200;
      canvas.height = 630;
      const ctx = canvas.getContext("2d");

      ctx.fillStyle = "#f3f4f6";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#111827";
      ctx.font = "bold 56px Futura, Arial, sans-serif";
      ctx.fillText("Olympics Trivia Score", 80, 140);
      ctx.font = "bold 140px Futura, Arial, sans-serif";
      ctx.fillText(`${state.quizScore} / ${state.quizQuestions.length}`, 80, 320);
      ctx.font = "36px Futura, Arial, sans-serif";
      ctx.fillStyle = "#6b7280";
      ctx.fillText("2026 Winter Olympics Medal Leaderboard", 80, 390);
      ctx.fillStyle = "#111827";
      ctx.font = "28px Futura, Arial, sans-serif";
      ctx.fillText(window.location.href, 80, 470);
      const rings = document.querySelector(".podium-rings-img");
      if (rings) ctx.drawImage(rings, 980, 70, 120, 80);

      return await new Promise((resolve) => canvas.toBlob(resolve, "image/png"));
    }

    async function shareQuizScore() {
      const status = document.getElementById("quizShareStatus");
      status.textContent = "";
      const shareUrl = quizShareLink({ includeScore: true });
      try {
        await navigator.clipboard.writeText(shareUrl);
        status.textContent = "Score link copied.";
      } catch (_) {
        if (navigator.share) {
          await navigator.share({ title: "Olympics Trivia Score", url: shareUrl });
          status.textContent = "Shared link.";
          return;
        }
        status.textContent = "Could not copy score link.";
      }
    }

    async function copySiteLink() {
      const status = document.getElementById("quizShareStatus");
      try {
        await navigator.clipboard.writeText(quizShareLink({ includeScore: false }));
        status.textContent = "Link copied.";
      } catch (_) {
        status.textContent = "Could not copy link.";
      }
    }

    function quizDeepLink() {
      const url = new URL(window.location.href);
      url.searchParams.set(QUIZ_QUERY_KEY, "1");
      return url.toString();
    }

    function quizShareLink({ includeScore }) {
      const url = new URL(QUIZ_SHARE_BASE_URL);
      url.searchParams.set("quiz", "1");
      if (includeScore) {
        url.searchParams.set("score", String(state.quizScore));
        url.searchParams.set("total", String(state.quizQuestions.length || QUIZ_QUESTION_COUNT));
      }
      return url.toString();
    }

    function shouldOpenQuizFromUrl() {
      try {
        const url = new URL(window.location.href);
        return url.searchParams.get(QUIZ_QUERY_KEY) === "1";
      } catch (_) {
        return false;
      }
    }

    function lockPageScroll() {
      state.scrollLockY = window.scrollY || document.documentElement.scrollTop || 0;
      document.body.style.position = "fixed";
      document.body.style.top = `-${state.scrollLockY}px`;
      document.body.style.left = "0";
      document.body.style.right = "0";
      document.body.style.width = "100%";
      document.body.style.overflow = "hidden";
    }

    function unlockPageScroll() {
      const restoreY = state.scrollLockY || 0;
      document.body.style.position = "";
      document.body.style.top = "";
      document.body.style.left = "";
      document.body.style.right = "";
      document.body.style.width = "";
      document.body.style.overflow = "";
      window.scrollTo(0, restoreY);
    }

    function openEasterQuiz() {
      if (state.easterOpen) return;
      state.easterOpen = true;
      lockPageScroll();
      const shell = document.getElementById("easterShell");
      shell.classList.add("open");
      shell.setAttribute("aria-hidden", "false");
      resetQuiz();
    }

    function closeEasterQuiz() {
      if (!state.easterOpen) return;
      state.easterOpen = false;
      const shell = document.getElementById("easterShell");
      shell.classList.remove("open");
      shell.setAttribute("aria-hidden", "true");
      unlockPageScroll();
    }

    function setSortableHeader(id, label, key) {
      const th = document.getElementById(id);
      th.innerHTML = `
        <button class="sort-head" type="button" data-sort="${key}">
          <span>${label}</span>
          <span class="sort-arrow${state.sortBy === key ? " active" : ""}" aria-hidden="true">▼</span>
        </button>
      `;
    }

    function renderSortIndicators() {
      const sortableKeys = ["gold", "silver", "bronze", "total"];
      sortableKeys.forEach((key) => {
        const th = document.querySelector(`th[data-sort="${key}"]`);
        if (th) th.setAttribute("aria-sort", key === state.sortBy ? "descending" : "none");
      });

      const arrows = document.querySelectorAll(".sort-arrow");
      arrows.forEach((arrow) => arrow.classList.remove("active"));
      const active = document.querySelector(`.sort-head[data-sort="${state.sortBy}"] .sort-arrow`);
      if (active) active.classList.add("active");
    }

    function render() {
      const sorted = sortRows(state.medals, state.sortBy);
      renderPodium(sorted);
      renderTable(sorted);
      renderSortIndicators();
    }

    async function loadData() {
      const t = STRINGS[state.language];
      document.getElementById("status").textContent = t.loading;
      const result = await fetchLocalMedals();
      state.medals = result.rows;
      state.fetchedAt = result.fetchedAt || new Date().toISOString();
      render();
      renderStatus();
    }

    function init() {
      try {
        const savedTheme = localStorage.getItem(THEME_STORAGE_KEY);
        if (savedTheme === "light" || savedTheme === "dark") {
          state.theme = savedTheme;
        }
      } catch (_) {}
      try {
        const savedLanguage = localStorage.getItem(LANGUAGE_STORAGE_KEY);
        if (savedLanguage && STRINGS[savedLanguage]) {
          state.language = savedLanguage;
        }
      } catch (_) {}

      document.body.setAttribute("data-theme", state.theme);
      applyStrings();
      document.getElementById("languagePicker").value = state.language;
      document.getElementById("themePicker").value = state.theme;
      resetQuiz();

      document.addEventListener("click", (e) => {
        const trigger = e.target.closest(".sort-head");
        if (trigger) {
          state.sortBy = trigger.dataset.sort || "total";
          render();
          return;
        }

        const option = e.target.closest(".quiz-option");
        if (option && !state.quizComplete && !state.quizRevealed) {
          state.quizSelected = Number(option.dataset.idx);
          renderQuiz();
        }
      });

      document.getElementById("languagePicker").addEventListener("change", (e) => {
        state.language = e.target.value;
        try {
          localStorage.setItem(LANGUAGE_STORAGE_KEY, state.language);
        } catch (_) {}
        applyStrings();
        render();
      });

      document.getElementById("themePicker").addEventListener("change", (e) => {
        state.theme = e.target.value;
        document.body.setAttribute("data-theme", state.theme);
        try {
          localStorage.setItem(THEME_STORAGE_KEY, state.theme);
        } catch (_) {}
      });

      document.getElementById("quizClose").addEventListener("click", closeEasterQuiz);
      document.getElementById("quizRestart").addEventListener("click", resetQuiz);
      document.getElementById("quizShare").addEventListener("click", shareQuizScore);
      document.getElementById("quizCopyLink").addEventListener("click", copySiteLink);
      document.getElementById("quizNext").addEventListener("click", () => {
        if (state.quizComplete || state.quizSelected === null) return;
        const current = state.quizQuestions[state.quizIndex];

        if (!state.quizRevealed) {
          const isCorrect = state.quizSelected === current.answer;
          state.quizHistory[state.quizIndex] = isCorrect;
          if (isCorrect) state.quizScore += 1;
          state.quizRevealed = true;
          renderQuiz();
          return;
        }

        if (state.quizIndex >= state.quizQuestions.length - 1) {
          state.quizComplete = true;
          renderQuiz();
          return;
        }
        state.quizSelected = null;
        state.quizRevealed = false;
        state.quizIndex += 1;
        renderQuiz();
      });

      loadData();
      setInterval(loadData, REFRESH_MS);

      if (shouldOpenQuizFromUrl()) {
        setTimeout(() => openEasterQuiz(), 50);
      }
    }

    init();
  </script>
</body>
</html>
